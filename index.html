<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✅ Lista de Tareas</title>
  <!-- Vinculamos CSS -->
  <link rel="stylesheet" href="style.css" />
  <!-- Vinculamos JS -->
  <script src="script.js" defer></script>
  <!-- CDN Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">
</head>
<body>

  <div class="contenedor">
    <!-- Elementos principales -->
    <h1 class="titulo">✅ Lista de Tareas</h1>
    <p class="mensaje" id="mensaje">Escribe tu primera tarea! 🤗</p>
    <input type="text" class="tarea-entrada" id="tarea-entrada" placeholder="Estudiar para el examen de..."/>
    
    <!-- Contenedor botones -->
    <div class="contenedor-botones">
      <button class="boton boton-agregar" id="boton-agregar">Crear Tarea</button>
      <button class="boton boton-ocultar">Ocultar Completadas</button>
      <button class="boton boton-eliminar">Eliminar Completadas</button>
    </div>

    <!-- Contendor contadores -->
    <div class="contenedor-contadores">
      <p>Tareas Totales: <span class="tareas-totales">0</span> </p>
      <p>Tareas Completadas: <span class="tareas-completadas">0</span> </p>
    </div>
    
    <!-- Contenedor tareas -->
    <div class="contenedor-tareas" id="contenedor-tareas">

      <!-- Tarea Nueva -->

      <div class="tarea">
        <p class="tarea-texto">Estudiar para el examen de Luis Limón! 😱</p>
        <div class="tarea-iconos">
          <i class="bi bi-check-circle"></i>
          <i class="bi bi-trash2"></i>
        </div>
      </div>

      <!-- Tarea Completada -->

      <div class="tarea tarea-completada">
        <p class="tarea-texto">Modelar los props para el set de programa Archivo 3:33! 👻</p>
        <div class="tarea-iconos">
          <i class="bi bi-dash-circle"></i>
          <i class="bi bi-trash2"></i>
        </div>
      </div>

    </div>

  </div>
  
</body>
</html>
